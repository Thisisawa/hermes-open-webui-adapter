# ═══════════════════════════════════════════════════════════
# Hermes Tool Card Enhancer Proxy — Configuration
# ═══════════════════════════════════════════════════════════
#
# Environment variables can override these settings:
# TOOL_MODE, BIND_PORT, BIND_HOST, AUTO_SPLIT_THRESHOLD
#
# See README.md for detailed documentation.

# ── Server ─────────────────────────────────────────────────
bind_host: "127.0.0.1"  # Localhost only, prevents external access
bind_port: 9099

# ── Tool Display Mode ──────────────────────────────────────
# enhance-v2  : Recommended — real-time streaming + <details> sub-tags (OpenWebUI compatible)
# enhance     : Filter done=false + inject completion tags with label
# passthrough : Pass through <details> tags directly (safest)
# strip       : Remove <details> and replace with plain text
tool_mode: "enhance-v2"

# ── Upstream Routing ───────────────────────────────────────
# Route table: path prefix → upstream Hermes Gateway address
# Format: "port": "http://address:port"
#
# Default Hermes profiles (run `hermes profiles list` to see yours):
#   30000: General chat
#   30001: Code development expert
#   30002: Data & research
#   30003: Trading & markets
#
# You can add or remove freely — just match your Gateway setup!
# If omitted, defaults to 30000-30003.
upstreams:
  "30000": "http://127.0.0.1:30000"
  "30001": "http://127.0.0.1:30001"
  "30002": "http://127.0.0.1:30002"
  "30003": "http://127.0.0.1:30003"

# ── Auto Split ─────────────────────────────────────────────
# Auto-split threshold (characters), 0 to disable
# Note: Conduit APP does not support session.split events
auto_split_threshold: 0

# ── History Sanitization (Anti-pollution) ──────────────────
# Before forwarding requests, convert <details type="tool_calls"> tags
# in assistant content to a safe format, breaking the pollution feedback loop.
enable_history_sanitization: true
# Result truncation length (adds "..." if exceeded)
sanitization_result_max_length: 2000
# History format:
#   flat   — [START_PREV_ACTION] k:v format (recommended, prevents JSON pollution)
#   legacy — natural language description (legacy)
tool_history_format: "legacy"

# ── Tool Usage Hint ────────────────────────────────────────
# Append a tool usage hint at the end of the last user message
# to prevent model attention dilution.
#
# This reads the content from a file (relative to this config file).
# Leave empty or set to "" to disable.
tool_usage_hint_file: "tool_hint.txt"
